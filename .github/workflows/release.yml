name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build all targets
        run: |
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for target in $targets; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
            output="plaus-${GOOS}-${GOARCH}${ext}"
            echo "Building $output..."
            GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "$output" ./cmd/plaus
          done

      - name: Create checksums
        run: sha256sum plaus-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            plaus-*
            checksums.txt
